version: '3.8'

services:
  app:
    build:
      context: ./
    container_name: footballAi-api
    restart: always
    env_file:
      - .env
    ports:
      - '2020:3000'
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    volumes:
      - type: bind
        source: ${STATIC_ASSET_PATH}
        target: /uploads

  postgres:
    image: postgres:16
    container_name: footballAi-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: footballAi-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elastic_data:
